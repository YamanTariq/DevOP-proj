<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ChirpTown</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">
    <main class="app-shell">
        <header class="topbar">
            <a class="brand" href="index.html">
                <strong>ChirpTown</strong>
                <span>Microblog feed</span>
            </a>
            <nav class="nav-actions" aria-label="Main navigation">
                <a class="button secondary" href="index.html">Back to Feed</a>
                <a class="button" href="signup.html">Create Account</a>
            </nav>
        </header>

        <section class="panel narrow">
            <h1>Login</h1>
            <p>Use your public username and password.</p>
            <section class="alerts" data-alerts aria-live="polite"></section>

            <form class="form" data-auth-form="login">
                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" placeholder="your_username" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button type="submit">Enter Feed</button>
            </form>

            <div class="auth-links">
                <a href="signup.html">Need an account? Sign up</a>
                <a href="index.html">Back to feed</a>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
